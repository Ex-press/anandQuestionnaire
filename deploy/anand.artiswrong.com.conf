# Apache vhost for anand.artiswrong.com -> gunicorn on 127.0.0.1:8011
# Install: sudo cp deploy/anand.artiswrong.com.conf /etc/apache2/sites-available/
#          sudo a2enmod proxy proxy_http headers
#          sudo a2ensite anand.artiswrong.com
#          sudo apache2ctl configtest && sudo systemctl reload apache2
#          sudo certbot --apache -d anand.artiswrong.com
<VirtualHost *:80>
	ServerName anand.artiswrong.com
	ServerAdmin alex@alexhornstein.com

	ProxyRequests Off
	ProxyPreserveHost On
	# Tell Django (via SECURE_PROXY_SSL_HEADER) the original scheme.
	RequestHeader set X-Forwarded-Proto "http"

	# Serve Django's collected static files (admin CSS/JS) directly.
	Alias /static/ /home/japhy/anand.artiswrong.com/static/
	<Directory /home/japhy/anand.artiswrong.com/static/>
		Require all granted
	</Directory>
	ProxyPass /static/ !

	ProxyPass / http://127.0.0.1:8011/
	ProxyPassReverse / http://127.0.0.1:8011/

	ErrorLog /home/japhy/logs/anand.artiswrong.com-error.log
	CustomLog /home/japhy/logs/anand.artiswrong.com-access.log combined
</VirtualHost>

# After running certbot, the generated -le-ssl.conf (port 443) should also carry:
#     RequestHeader set X-Forwarded-Proto "https"
# so Django builds https:// absolute URLs correctly. Twilio signature validation
# uses TWILIO_WEBHOOK_BASE_URL from .env, so it is unaffected by the proxy header.

